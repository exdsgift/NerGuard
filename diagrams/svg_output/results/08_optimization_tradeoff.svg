<svg id="container" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 500px;" viewBox="0 0 500 500" role="graphics-document document" aria-roledescription="quadrantChart"><style>#container{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#000000;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#container .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#container .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#container .error-icon{fill:#552222;}#container .error-text{fill:#552222;stroke:#552222;}#container .edge-thickness-normal{stroke-width:1px;}#container .edge-thickness-thick{stroke-width:3.5px;}#container .edge-pattern-solid{stroke-dasharray:0;}#container .edge-thickness-invisible{stroke-width:0;fill:none;}#container .edge-pattern-dashed{stroke-dasharray:3;}#container .edge-pattern-dotted{stroke-dasharray:2;}#container .marker{fill:#666;stroke:#666;}#container .marker.cross{stroke:#666;}#container svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#container p{margin:0;}#container :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g class="main"><g class="quadrants"><g class="quadrant"><rect x="263" y="45" width="232" height="212" fill="#eee"></rect><text x="0" y="0" fill="#111111" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 50) rotate(0)">High Rate, High Score</text></g><g class="quadrant"><rect x="31" y="45" width="232" height="212" fill="#f3f3f3"></rect><text x="0" y="0" fill="#0c0c0c" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 50) rotate(0)">Low Rate, High Score</text></g><g class="quadrant"><rect x="31" y="257" width="232" height="212" fill="#f8f8f8"></rect><text x="0" y="0" fill="#070707" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 262) rotate(0)">Low Rate, Low Score</text></g><g class="quadrant"><rect x="263" y="257" width="232" height="212" fill="#fdfdfd"></rect><text x="0" y="0" fill="#020202" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 262) rotate(0)">High Rate, Low Score</text></g></g><g class="border"><line x1="30" y1="45" x2="496" y2="45" style="stroke: rgb(213, 213, 213); stroke-width: 2;"></line><line x1="495" y1="46" x2="495" y2="468" style="stroke: rgb(213, 213, 213); stroke-width: 2;"></line><line x1="30" y1="469" x2="496" y2="469" style="stroke: rgb(213, 213, 213); stroke-width: 2;"></line><line x1="31" y1="46" x2="31" y2="468" style="stroke: rgb(213, 213, 213); stroke-width: 2;"></line><line x1="263" y1="46" x2="263" y2="468" style="stroke: rgb(213, 213, 213); stroke-width: 1;"></line><line x1="32" y1="257" x2="494" y2="257" style="stroke: rgb(213, 213, 213); stroke-width: 1;"></line></g><g class="data-points"><g class="data-point"><circle cx="142.35999999999999" cy="121.32000000000002" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(142.35999999999999, 126.32000000000002) rotate(0)">Optimal</text></g><g class="data-point"><circle cx="402.2" cy="257" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(402.2, 262) rotate(0)">Aggressive</text></g><g class="data-point"><circle cx="193.4" cy="151" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(193.4, 156) rotate(0)">Balanced</text></g><g class="data-point"><circle cx="100.6" cy="108.60000000000001" r="5" fill="hsl(0, 0%, NaN%)" stroke="hsl(0, 0%, NaN%)" stroke-width="0px"></circle><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(100.6, 113.60000000000001) rotate(0)">Conservative</text></g></g><g class="labels"><g class="label"><text x="0" y="0" fill="#111111" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 479) rotate(0)">Low Routing Rate</text></g><g class="label"><text x="0" y="0" fill="#111111" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 479) rotate(0)">High Routing Rate</text></g><g class="label"><text x="0" y="0" fill="#111111" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 363) rotate(-90)">Low F0.5 Score</text></g><g class="label"><text x="0" y="0" fill="#111111" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 151) rotate(-90)">High F0.5 Score</text></g></g><g class="title"><text x="0" y="0" fill="#111111" font-size="20" dominant-baseline="hanging" text-anchor="middle" transform="translate(250, 10) rotate(0)">Threshold Optimization Trade-off</text></g></g></svg>