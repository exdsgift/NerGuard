<svg id="container" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 661.28125 450" style="max-width: 661.28125px;" role="graphics-document document" aria-roledescription="pie"><style>#container{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#000000;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#container .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#container .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#container .error-icon{fill:#552222;}#container .error-text{fill:#552222;stroke:#552222;}#container .edge-thickness-normal{stroke-width:1px;}#container .edge-thickness-thick{stroke-width:3.5px;}#container .edge-pattern-solid{stroke-dasharray:0;}#container .edge-thickness-invisible{stroke-width:0;fill:none;}#container .edge-pattern-dashed{stroke-dasharray:3;}#container .edge-pattern-dotted{stroke-dasharray:2;}#container .marker{fill:#666;stroke:#666;}#container .marker.cross{stroke:#666;}#container svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#container p{margin:0;}#container .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#container .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#container .pieTitleText{text-anchor:middle;font-size:25px;fill:#333;font-family:"trebuchet ms",verdana,arial,sans-serif;}#container .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#000000;font-size:17px;}#container .legend text{fill:#333;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#container :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"></circle><path d="M0,-185A185,185,0,1,1,-78.769,167.393L0,0Z" fill="#F4F4F4" class="pieCircle"></path><path d="M-78.769,167.393A185,185,0,0,1,0,-185L0,0Z" fill="#555" class="pieCircle"></path><text transform="translate(135.4084507190012,30.26737474377029)" class="slice" style="text-anchor: middle;">57%</text><text transform="translate(-135.4084507190012,-30.267374743770336)" class="slice" style="text-anchor: middle;">43%</text><text x="0" y="-200" class="pieTitleText">Error Type Distribution</text><g class="legend" transform="translate(216,-22)"><rect width="18" height="18" style="fill: rgb(244, 244, 244); stroke: rgb(244, 244, 244);"></rect><text x="22" y="14">False Negatives [57]</text></g><g class="legend" transform="translate(216,0)"><rect width="18" height="18" style="fill: rgb(85, 85, 85); stroke: rgb(85, 85, 85);"></rect><text x="22" y="14">False Positives [43]</text></g></g></svg>